<?xml version="1.0" encoding="utf-8" standalone="no"?>
<!--
  mask-lips.svg
  
  6 viseme cutout shapes for Mask's lip-sync animation.
  Each viseme is a FILLED shape that will be used as a mask cutout — when
  active, it punches a hole through mask-base.svg revealing the Starfield
  background underneath. Fill color is arbitrary; only shape matters.
  
  Mouth position (calibrated from source image):
    center: (213, 229)
    bbox: x 154-272 (width 118), y 195-263 (height 68)
  
  Visemes:
    rest    — the actual smile shape, traced from source. Idle state.
    closed  — flat narrow band (M, B, P)
    open_a  — wide open oval (AH)
    open_e  — wide flat oval (EE)
    open_o  — small round (OH)
    open_u  — small puckered round (OO, W)
  
  React component toggles which viseme group is "active" (visible). Default: rest.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  
  <!-- VISEME: REST (the iconic smile, traced from source) -->
  <g id="viseme-rest" class="viseme">
    <g transform="translate(-4, -4)">
      <g transform="translate(0.000000,408.000000) scale(0.100000,-0.100000)" fill="#000000" fill-rule="evenodd">
        <path d="M1601 2018 c85 -307 273 -545 464 -588 28 -6 57 -15 66 -20 9 -4 22
-5 29 0 6 4 20 5 30 3 10 -3 31 2 48 11 17 9 40 16 52 16 11 0 43 16 70 35 27
19 55 35 61 35 18 0 120 99 154 150 17 25 45 59 63 77 18 17 32 40 32 50 0 10
16 43 35 73 19 30 35 61 35 70 0 9 4 20 9 26 11 10 18 76 10 84 -4 3 -42 -28
-87 -68 -44 -41 -91 -80 -104 -86 -13 -7 -48 -29 -78 -49 -30 -20 -67 -37 -82
-37 -15 0 -30 -4 -33 -10 -3 -5 -23 -10 -44 -10 -21 0 -41 -3 -45 -7 -90 -90
-550 113 -653 288 -37 62 -54 38 -32 -43z"/>
      </g>
    </g>
  </g>
  
  <!-- VISEME: CLOSED (M, B, P) -->
  <g id="viseme-closed" class="viseme" style="display: none;">
    <rect x="158" y="222" width="110" height="14" rx="6" fill="#000000"/>
  </g>
  
  <!-- VISEME: OPEN_A (AH) — wide open large oval -->
  <g id="viseme-open-a" class="viseme" style="display: none;">
    <ellipse cx="213" cy="229" rx="62" ry="32" fill="#000000"/>
  </g>
  
  <!-- VISEME: OPEN_E (EE) — wide horizontal slit -->
  <g id="viseme-open-e" class="viseme" style="display: none;">
    <ellipse cx="213" cy="229" rx="68" ry="14" fill="#000000"/>
  </g>
  
  <!-- VISEME: OPEN_O (OH) — small circle -->
  <g id="viseme-open-o" class="viseme" style="display: none;">
    <ellipse cx="213" cy="229" rx="32" ry="30" fill="#000000"/>
  </g>
  
  <!-- VISEME: OPEN_U (OO) — smallest, narrowest puckered shape -->
  <g id="viseme-open-u" class="viseme" style="display: none;">
    <ellipse cx="213" cy="229" rx="22" ry="24" fill="#000000"/>
  </g>
  
</svg>
